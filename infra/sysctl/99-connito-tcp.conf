# TCP buffer + congestion-control tuning for Connito validator/server hosts.
#
# Install:
#   sudo cp infra/sysctl/99-connito-tcp.conf /etc/sysctl.d/
#   sudo sysctl --system
#
# The compose stack uses network_mode: host, so container traffic uses the
# host's TCP stack directly — these settings must live on the host.

# Raise max socket buffer ceilings so the autotuner can actually grow past
# the default (~208 KB on most distros). Single-connection throughput is
# bounded by buffer / RTT, so 208 KB at 200 ms RTT caps a transfer at ~1 MB/s.
# 16 MB gives enough headroom for a 3.35 GiB checkpoint to stream cleanly
# across continents.
net.core.wmem_max = 16777216
net.core.rmem_max = 16777216

# Let TCP autotuning scale into the new ceiling. Values are min default max.
net.ipv4.tcp_wmem = 4096 87380 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216

# BBR handles bulk transfers over wide-area links far better than CUBIC.
# It requires a pacing-capable qdisc; fq is the standard pairing.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
